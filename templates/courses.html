{% extends "layout.html" %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">📚 All Courses</h2>

    <div class="row">

        {% for course in courses %}
        <div class="col-md-4 mb-4">
            <div class="card p-3 shadow h-100">

                <h5 class="mb-3">{{ course[1] }}</h5>

                <div class="mt-auto">
                    <a href="/enroll/{{ course[0] }}" class="btn btn-success btn-sm">
                        Enroll
                    </a>

                    <a href="/course/{{ course[0] }}" class="btn btn-primary btn-sm">
                        View
                    </a>
                </div>

            </div>
        </div>
        {% endfor %}

    </div>

</div>

{% endblock %}
