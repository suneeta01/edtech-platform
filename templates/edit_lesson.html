{% extends "layout.html" %}

{% block content %}

<h2>Edit Lesson</h2>

<form method="POST">
    <label>Lesson Title:</label><br>
    <input type="text" name="lesson_title" value="{{ lesson[2] }}" required><br><br>

    <label>Video URL:</label><br>
    <input type="text" name="video_url" value="{{ lesson[3] }}" required><br><br>

    <button type="submit">Update</button>
</form>

{% endblock %}
