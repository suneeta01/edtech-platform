<!DOCTYPE html>
<html>
<head>
    <title>EdTech Platform</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .content {
            flex: 1;
        }

        .card {
            border-radius: 12px;
        }

        .btn {
            border-radius: 8px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand fw-bold text-warning" href="/dashboard">🚀 EdTech</a>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">

        {% if 'user' in session %}

            <li class="nav-item">
                <a class="nav-link" href="/dashboard">Dashboard</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/courses">Courses</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/mycourses">My Learning</a>
            </li>

            {% if session.get('role') == 'admin' %}
            <li class="nav-item">
                <a class="nav-link text-warning" href="/admin">Admin</a>
            </li>
            {% endif %}

            <li class="nav-item">
                <a class="nav-link text-danger" href="/logout">Logout</a>
            </li>

        {% endif %}

        </ul>
    </div>
</nav>

<hr>

<div class="content">
    {% block content %}
    {% endblock %}
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 EdTech Platform |  Developed by Suneeta Pattanayak.
</footer>

</body>
</html>
